<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>অ্যাডমিন প্যানেল</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F0EEE9;--border:#E2DFD8;
  --text:#1A1917;--text2:#6B6860;--text3:#9B9890;
  --accent:#2563EB;--accent2:#1D4ED8;--accent-light:#EFF6FF;
  --danger:#DC2626;--danger-light:#FEF2F2;
  --success:#16A34A;--success-light:#F0FDF4;
  --warning:#D97706;--warning-light:#FFFBEB;
  --radius:10px;--radius-lg:16px;
}
body{font-family:'Hind Siliguri','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(135deg,#EFF6FF 0%,#F7F6F3 60%);}
.login-card{background:var(--surface);border-radius:var(--radius-lg);padding:2.5rem 2rem;width:100%;max-width:380px;border:1px solid var(--border);}
.login-icon{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;}
.login-icon svg{width:26px;height:26px;color:white;}
.login-card h1{font-size:22px;font-weight:600;margin-bottom:4px;}
.login-card p{color:var(--text2);font-size:14px;margin-bottom:1.75rem;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.form-group input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:var(--accent);}
.btn-login{width:100%;padding:11px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.2s;margin-top:4px;}
.btn-login:hover{background:var(--accent2);}
#loginError{color:var(--danger);font-size:13px;margin-top:10px;display:none;}

/* TOPBAR */
#adminScreen{display:none;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.brand-icon svg{width:18px;height:18px;color:white;}
.brand-name{font-size:17px;font-weight:600;}
.admin-badge{font-size:11px;font-weight:600;background:#FEF3C7;color:#92400E;padding:3px 10px;border-radius:6px;}
.btn-logout{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text2);transition:all 0.2s;}
.btn-logout:hover{background:var(--danger-light);color:var(--danger);border-color:var(--danger);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 60px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.25rem 0.75rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;}
.sidebar-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:0 8px;margin-bottom:6px;margin-top:1rem;}
.sidebar-label:first-child{margin-top:0;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text2);transition:all 0.15s;margin-bottom:2px;border:none;background:transparent;width:100%;font-family:inherit;text-align:left;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500;}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.nav-count{margin-left:auto;font-size:11px;background:var(--surface2);color:var(--text3);border-radius:10px;padding:1px 7px;}
.nav-item.active .nav-count{background:#DBEAFE;color:var(--accent);}

/* CONTENT */
.content{padding:1.75rem;}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px;}
.content-header h2{font-size:20px;font-weight:600;}
.btn-add{display:flex;align-items:center;gap:7px;background:var(--accent);color:white;border:none;border-radius:var(--radius);padding:9px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.2s;}
.btn-add:hover{background:var(--accent2);}
.btn-add svg{width:16px;height:16px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.75rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;}
.stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-icon svg{width:18px;height:18px;}
.stat-value{font-size:26px;font-weight:600;line-height:1;margin-bottom:4px;}
.stat-label{font-size:12px;color:var(--text2);}

/* FILE TABLE */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem;}
.table-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text3);}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;}
.search-wrap input:focus{border-color:var(--accent);}
.filter-sel{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text2);cursor:pointer;outline:none;}
table{width:100%;border-collapse:collapse;}
th{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:10px 1.25rem;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:11px 1.25rem;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.file-name-cell{display:flex;align-items:center;gap:10px;}
.file-emoji{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.type-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:5px;}
.cat-badge{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--surface2);color:var(--text2);}
.action-btns{display:flex;gap:6px;}
.icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all 0.15s;}
.icon-btn:hover{background:var(--surface);border-color:var(--text3);}
.icon-btn.danger:hover{background:var(--danger-light);color:var(--danger);border-color:#FECACA;}
.icon-btn svg{width:14px;height:14px;}
.empty-row td{text-align:center;padding:3rem;color:var(--text3);}

/* USERS TABLE */
.user-row{display:flex;align-items:center;gap:12px;padding:11px 1.25rem;border-bottom:1px solid var(--border);}
.user-row:last-child{border-bottom:none;}
.user-row:hover{background:var(--surface2);}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:white;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:13px;font-weight:500;}
.user-meta{font-size:11px;color:var(--text3);}
.user-badge{font-size:11px;padding:3px 9px;border-radius:6px;}
.online{background:#DCFCE7;color:#15803D;}
.offline{background:var(--surface2);color:var(--text3);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:460px;padding:1.75rem;transform:translateY(12px);transition:transform 0.2s;}
.modal-bg.open .modal{transform:translateY(0);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-head h3{font-size:17px;font-weight:600;}
.btn-close{background:var(--surface2);border:none;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);}
.btn-close svg{width:16px;height:16px;}
.mg{margin-bottom:1rem;}
.mg label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.mg input,.mg select,.mg textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;resize:vertical;}
.mg input:focus,.mg select:focus,.mg textarea:focus{border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;margin-top:1.5rem;}
.btn-save{flex:1;padding:10px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-save:hover{background:var(--accent2);}
.btn-cancel{padding:10px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:inherit;color:var(--text2);}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:white;border-radius:var(--radius);padding:11px 18px;font-size:14px;z-index:300;transform:translateY(80px);opacity:0;transition:all 0.3s;pointer-events:none;display:flex;align-items:center;gap:8px;}
#toast.show{transform:translateY(0);opacity:1;}
#toast svg{width:15px;height:15px;}

/* VIEW LINK */
.view-site-btn{display:flex;align-items:center;gap:6px;background:var(--success-light);color:var(--success);border:1px solid #BBF7D0;border-radius:var(--radius);padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none;transition:all 0.15s;}
.view-site-btn:hover{background:#DCFCE7;}
.view-site-btn svg{width:14px;height:14px;}

@media(max-width:640px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .content{padding:1rem;}
  .row2{grid-template-columns:1fr;}
  .topbar{padding:0 1rem;}
  th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>অ্যাডমিন লগইন</h1>
    <p>শুধুমাত্র অ্যাডমিনের জন্য</p>
    <div class="form-group">
      <label>ইউজারনেম</label>
      <input type="text" id="adminUser" placeholder="admin" />
    </div>
    <div class="form-group">
      <label>পাসওয়ার্ড</label>
      <input type="password" id="adminPass" placeholder="পাসওয়ার্ড দিন" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn-login" onclick="doLogin()">লগইন করুন</button>
    <div id="loginError">❌ ইউজারনেম বা পাসওয়ার্ড ভুল</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminScreen">
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <span class="brand-name">অ্যাডমিন প্যানেল</span>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="index.html" class="view-site-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        সাইট দেখুন
      </a>
      <button class="btn-logout" onclick="doLogout()">লগআউট</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">ম্যানেজমেন্ট</div>
      <button class="nav-item active" id="navFiles" onclick="showTab('files')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        ফাইল ম্যানেজার
        <span class="nav-count" id="navFileCount">0</span>
      </button>
      <button class="nav-item" id="navUsers" onclick="showTab('users')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ভিজিটর লগ
        <span class="nav-count" id="navUserCount">0</span>
      </button>

      <div class="sidebar-label">ফাইলের ধরন</div>
      <button class="nav-item" onclick="filterByType('pdf')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        PDF <span class="nav-count" id="cPdf">0</span>
      </button>
      <button class="nav-item" onclick="filterByType('doc')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Word <span class="nav-count" id="cDoc">0</span>
      </button>
      <button class="nav-item" onclick="filterByType('img')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        ছবি <span class="nav-count" id="cImg">0</span>
      </button>
      <button class="nav-item" onclick="filterByType('video')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        ভিডিও <span class="nav-count" id="cVideo">0</span>
      </button>
      <button class="nav-item" onclick="filterByType('')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/></svg>
        সব দেখুন <span class="nav-count" id="cAll">0</span>
      </button>
    </aside>

    <main class="content">

      <!-- FILES TAB -->
      <div id="tabFiles">
        <div class="content-header">
          <h2>📁 ফাইল ম্যানেজার</h2>
          <button class="btn-add" onclick="openModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            নতুন ফাইল যোগ করুন
          </button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon" style="background:#EFF6FF;">
              <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="stat-value" id="sTotalFiles">0</div>
            <div class="stat-label">মোট ফাইল</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#F0FDF4;">
              <svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
            </div>
            <div class="stat-value" id="sTotalCats">0</div>
            <div class="stat-label">ক্যাটাগরি</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#FFFBEB;">
              <svg viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div class="stat-value" id="sThisWeek">0</div>
            <div class="stat-label">এই সপ্তাহে</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#FEF2F2;">
              <svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            <div class="stat-value" id="sVisitors">0</div>
            <div class="stat-label">ভিজিটর</div>
          </div>
        </div>

        <div class="table-card">
          <div class="table-header">
            <div class="search-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="searchInput" placeholder="ফাইল খুঁজুন..." oninput="renderTable()" />
            </div>
            <select class="filter-sel" id="catFilter" onchange="renderTable()">
              <option value="">সব ক্যাটাগরি</option>
            </select>
          </div>
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>ফাইলের নাম</th>
                  <th>ধরন</th>
                  <th>ক্যাটাগরি</th>
                  <th>তারিখ</th>
                  <th>অ্যাকশন</th>
                </tr>
              </thead>
              <tbody id="fileTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- USERS TAB -->
      <div id="tabUsers" style="display:none;">
        <div class="content-header">
          <h2>👥 ভিজিটর লগ</h2>
          <button class="btn-add" style="background:#6B6860;" onclick="clearVisitors()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            লগ মুছুন
          </button>
        </div>
        <div class="table-card">
          <div class="card-header" style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;">সাম্প্রতিক ভিজিটর</div>
          <div id="visitorList"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ADD FILE MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h3>নতুন ফাইল যোগ করুন</h3>
      <button class="btn-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="mg">
      <label>ফাইলের নাম *</label>
      <input type="text" id="mName" placeholder="যেমন: প্রজেক্ট রিপোর্ট ২০২৫" />
    </div>
    <div class="mg">
      <label>ডাউনলোড / দেখার লিঙ্ক *</label>
      <input type="url" id="mUrl" placeholder="https://drive.google.com/..." />
    </div>
    <div class="row2">
      <div class="mg">
        <label>ফাইলের ধরন</label>
        <select id="mType">
          <option value="pdf">📄 PDF</option>
          <option value="doc">📝 Word</option>
          <option value="xls">📊 Excel</option>
          <option value="ppt">📋 PowerPoint</option>
          <option value="img">🖼️ ছবি</option>
          <option value="video">🎬 ভিডিও</option>
          <option value="audio">🎵 অডিও</option>
          <option value="zip">📦 ZIP</option>
          <option value="other">📁 অন্যান্য</option>
        </select>
      </div>
      <div class="mg">
        <label>ক্যাটাগরি</label>
        <input type="text" id="mCat" placeholder="যেমন: শিক্ষা, অফিস..." />
      </div>
    </div>
    <div class="mg">
      <label>বিবরণ (ঐচ্ছিক)</label>
      <textarea id="mDesc" rows="2" placeholder="এই ফাইল সম্পর্কে কিছু লিখুন..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveFile()">✅ সংরক্ষণ করুন</button>
      <button class="btn-cancel" onclick="closeModal()">বাতিল</button>
    </div>
  </div>
</div>

<div id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span id="toastMsg"></span></div>

<script>
// ── CONFIG — এখানে আপনার পাসওয়ার্ড বদলান ──
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin123'; // ← এটা বদলান!

const TYPE = {
  pdf:  {emoji:'📄',bg:'#FEF2F2',color:'#DC2626',label:'PDF'},
  doc:  {emoji:'📝',bg:'#EFF6FF',color:'#2563EB',label:'Word'},
  xls:  {emoji:'📊',bg:'#F0FDF4',color:'#16A34A',label:'Excel'},
  ppt:  {emoji:'📋',bg:'#FFFBEB',color:'#D97706',label:'PPT'},
  img:  {emoji:'🖼️',bg:'#F5F3FF',color:'#7C3AED',label:'ছবি'},
  video:{emoji:'🎬',bg:'#FFF7ED',color:'#EA580C',label:'ভিডিও'},
  audio:{emoji:'🎵',bg:'#FDF4FF',color:'#9333EA',label:'অডিও'},
  zip:  {emoji:'📦',bg:'#F1F5F9',color:'#475569',label:'ZIP'},
  other:{emoji:'📁',bg:'#F8FAFC',color:'#64748B',label:'ফাইল'},
};

let files = JSON.parse(localStorage.getItem('fm_files')||'[]');
let visitors = JSON.parse(localStorage.getItem('fm_visitors')||'[]');
let typeFilter = '';

// ── AUTH ──
function doLogin(){
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  if(u===ADMIN_USER && p===ADMIN_PASS){
    sessionStorage.setItem('admin_ok','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    initAdmin();
  } else {
    document.getElementById('loginError').style.display='block';
    setTimeout(()=>document.getElementById('loginError').style.display='none',3000);
  }
}
function doLogout(){
  sessionStorage.removeItem('admin_ok');
  document.getElementById('adminScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('adminUser').value='';
  document.getElementById('adminPass').value='';
}
if(sessionStorage.getItem('admin_ok')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminScreen').style.display='block';
  initAdmin();
}

function initAdmin(){
  updateStats();
  updateSidebar();
  updateCatFilter();
  renderTable();
  renderVisitors();
}

// ── TABS ──
function showTab(tab){
  document.getElementById('tabFiles').style.display = tab==='files'?'':'none';
  document.getElementById('tabUsers').style.display = tab==='users'?'':'none';
  document.getElementById('navFiles').classList.toggle('active', tab==='files');
  document.getElementById('navUsers').classList.toggle('active', tab==='users');
}

// ── FILES ──
function saveFile(){
  const name = document.getElementById('mName').value.trim();
  const url  = document.getElementById('mUrl').value.trim();
  if(!name||!url){showToast('নাম এবং লিঙ্ক দেওয়া আবশ্যক');return;}
  const f = {
    id: Date.now().toString(),
    name, url,
    type: document.getElementById('mType').value,
    cat:  document.getElementById('mCat').value.trim()||'সাধারণ',
    desc: document.getElementById('mDesc').value.trim(),
    date: new Date().toLocaleDateString('bn-BD'),
    ts:   Date.now(),
  };
  files.unshift(f);
  localStorage.setItem('fm_files', JSON.stringify(files));
  updateStats(); updateSidebar(); updateCatFilter(); renderTable();
  closeModal();
  showToast('ফাইল সংরক্ষিত হয়েছে!');
}

function deleteFile(id){
  if(!confirm('ফাইলটি মুছে ফেলবেন?')) return;
  files = files.filter(f=>f.id!==id);
  localStorage.setItem('fm_files', JSON.stringify(files));
  updateStats(); updateSidebar(); updateCatFilter(); renderTable();
  showToast('মুছে ফেলা হয়েছে');
}

function filterByType(t){ typeFilter=t; renderTable(); }

function renderTable(){
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const list = files.filter(f=>{
    const mQ = !q || f.name.toLowerCase().includes(q)||(f.cat||'').toLowerCase().includes(q);
    const mC = !cat || f.cat===cat;
    const mT = !typeFilter || f.type===typeFilter;
    return mQ&&mC&&mT;
  });
  const tb = document.getElementById('fileTableBody');
  if(!list.length){
    tb.innerHTML=`<tr class="empty-row"><td colspan="5">📭 কোনো ফাইল পাওয়া যায়নি</td></tr>`;
    return;
  }
  tb.innerHTML = list.map(f=>{
    const t=TYPE[f.type]||TYPE.other;
    return `<tr>
      <td><div class="file-name-cell">
        <div class="file-emoji" style="background:${t.bg};">${t.emoji}</div>
        <div>
          <div style="font-weight:500;font-size:13px;">${esc(f.name)}</div>
          ${f.desc?`<div style="font-size:11px;color:var(--text3);">${esc(f.desc).substring(0,40)}</div>`:''}
        </div>
      </div></td>
      <td><span class="type-badge" style="background:${t.bg};color:${t.color};">${t.label}</span></td>
      <td><span class="cat-badge">${esc(f.cat||'সাধারণ')}</span></td>
      <td style="color:var(--text3);font-size:12px;">${f.date||''}</td>
      <td><div class="action-btns">
        <a href="${esc(f.url)}" target="_blank" class="icon-btn" title="দেখুন">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </a>
        <button class="icon-btn danger" onclick="deleteFile('${f.id}')" title="মুছুন">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div></td>
    </tr>`;
  }).join('');
}

function updateStats(){
  document.getElementById('sTotalFiles').textContent = files.length;
  const cats = new Set(files.map(f=>f.cat).filter(Boolean));
  document.getElementById('sTotalCats').textContent = cats.size;
  const weekAgo = Date.now()-7*24*60*60*1000;
  document.getElementById('sThisWeek').textContent = files.filter(f=>f.ts>weekAgo).length;
  document.getElementById('sVisitors').textContent = visitors.length;
}

function updateSidebar(){
  const c=t=>files.filter(f=>f.type===t).length;
  document.getElementById('navFileCount').textContent = files.length;
  document.getElementById('navUserCount').textContent = visitors.length;
  document.getElementById('cPdf').textContent   = c('pdf');
  document.getElementById('cDoc').textContent   = c('doc');
  document.getElementById('cImg').textContent   = c('img');
  document.getElementById('cVideo').textContent = c('video');
  document.getElementById('cAll').textContent   = files.length;
}

function updateCatFilter(){
  const sel = document.getElementById('catFilter');
  const cats = [...new Set(files.map(f=>f.cat).filter(Boolean))];
  const cur = sel.value;
  sel.innerHTML = '<option value="">সব ক্যাটাগরি</option>' +
    cats.map(c=>`<option value="${esc(c)}" ${c===cur?'selected':''}>${esc(c)}</option>`).join('');
}

// ── VISITORS ──
function renderVisitors(){
  const vl = document.getElementById('visitorList');
  if(!visitors.length){
    vl.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--text3);">এখনো কোনো ভিজিটর নেই</div>`;
    return;
  }
  vl.innerHTML = [...visitors].reverse().map(v=>`
    <div class="user-row">
      <div class="user-avatar">${v.name.charAt(0).toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${esc(v.name)}</div>
        <div class="user-meta">${esc(v.time)} · ${esc(v.page||'হোমপেজ')}</div>
      </div>
      <span class="user-badge ${v.online?'online':'offline'}">${v.online?'অনলাইন':'অফলাইন'}</span>
    </div>`).join('');
}

function clearVisitors(){
  if(!confirm('সব ভিজিটর লগ মুছে ফেলবেন?')) return;
  visitors=[];
  localStorage.setItem('fm_visitors', JSON.stringify(visitors));
  updateStats(); updateSidebar(); renderVisitors();
  showToast('ভিজিটর লগ মুছে ফেলা হয়েছে');
}

// ── MODAL ──
function openModal(){document.getElementById('modalBg').classList.add('open');}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  ['mName','mUrl','mCat','mDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mType').value='pdf';
}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── TOAST ──
function showToast(msg){
  document.getElementById('toastMsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
